<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="prjdev.css" />
    <title>Dessin Canvas</title>
  </head>
  <body>
    <header>
      <div class="tache">
        <button id="btnPinceau">Pinceau</button>
        <button id="btnGomme">Gomme</button>
      </div>
      <div class="config">
        <!-- palettecouleur -->
        <span id="palettecouleur">
          <label for="colorPicker">Couleur</label>
          <input type="color" id="colorPicker" value="#e94560" />
        </span>
        <!-- epaisseur -->
        <span id="epaisseur">
          <label for="epSlider">Taille</label>
          <input type="range" id="epSlider" min="1" max="60" value="6" />
          <span id="epVal">6</span>
        </span>
        <!-- Formes -->
        <span class="formpicker">
          <label for="formSelect">Forme</label>
          <select id="formSelect">
            <option value="libre">Libre</option>
            <option value="rectangle">Rectangle</option>
            <option value="cercle">Cercle</option>
            <option value="triangle">Triangle</option>
          </select>
        </span>
        <!-- Remplir -->
        <span class="remplirpicker">
          <label for="remplir">Remplir</label>
          <input type="checkbox" id="remplir" />
        </span>
      </div>
      <div class="menu">
        <button id="btnEffacer">Effacer</button>
        <button id="btnSauvegarder">Sauvgarder</button>
        <button id="btnImporter">Importer</button>
        <input type="file" id="fileInput" accept="image/*" />
      </div>
    </header>
    <main>
      <section id="s1"></section>
      <section id="s2"><canvas id="canv"></canvas></section>
    </main>
    <footer>
      <span id="statusTool">Outil : Pinceau</span>
      <span id="statusSize">Taille : 6px</span>
      <span id="statusPos">X: 0 Y: 0</span>
      <span style="margin-left: auto; color: #555">
        B=Pinceau · E=Gomme · S=Sauvegarder · Suppr=Effacer · +=Taille+ ·
        -=Taille-
      </span>

      <script src="evenementpd.js"></script>
    </footer>
  </body>
</html>
